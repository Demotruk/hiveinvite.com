app = 'swarm-trust-api'
primary_region = 'lhr'

[build]

[env]
  PORT = '3000'
  START_BLOCK = '105420000'
  DB_PATH = '/data/swarm_trust.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  path = '/api/status'
  timeout = '5s'

[mounts]
  source = 'swarm_trust_data'
  destination = '/data'
